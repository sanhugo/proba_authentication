services:
  auth_db:
    image: 'postgres:latest'
    restart: no
    environment:
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_PASSWORD=${PG_PASS}
      - POSTGRES_USER=${PG_USER}
    ports:
      - "5432:5432"

  pgadmin:
    image: elestio/pgadmin:latest
    restart: no
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_LISTEN_PORT=8080
    ports:
      - "8090:8080"
    depends_on:
      - auth_db
