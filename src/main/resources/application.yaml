spring:
  application:
    name: authentication
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth}
    username: ${DB_USER:postgres}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: ${SERVER_PORT:8081}

