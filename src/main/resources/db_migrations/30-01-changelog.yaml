databaseChangeLog:
  - changeSet:
      id: 1780134869439-1
      author: Alexandr
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                  name: user_id
                  type: uuid
              - column:
                  name: role
                  type: VARCHAR(20)
            tableName: user_roles
  - changeSet:
      id: 1780134869439-2
      author: Alexandr
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
                  name: id
                  type: uuid
              - column:
                  constraints:
                    nullable: false
                  name: login
                  type: VARCHAR(40)
              - column:
                  constraints:
                    nullable: false
                  name: email
                  type: VARCHAR(254)
              - column:
                  constraints:
                    nullable: false
                  name: password
                  type: VARCHAR(255)
            tableName: users
  - changeSet:
      id: 1780134869439-3
      author: Alexandr
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addUniqueConstraint:
            columnNames: email
            constraintName: uc_users_email
            tableName: users
  - changeSet:
      id: 1780134869439-4
      author: Alexandr
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addUniqueConstraint:
            columnNames: login
            constraintName: uc_users_login
            tableName: users
  - changeSet:
      id: 1780134869439-5
      author: Alexandr
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: user_id
            baseTableName: user_roles
            constraintName: fk_user_roles_on_user
            referencedColumnNames: id
            referencedTableName: users
  - changeSet:
      id: 1780134869439-6
      author: Alexandr
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createIndex:
            tableName: users
            indexName: idx_users_login
            columns:
              column:
                login
        - createIndex:
            tableName: users
            indexName: idx_users_email
            columns:
              column:
                email
        - createIndex:
            tableName: user_roles
            indexName: idx_roles_user_id
            columns:
              column:
                user_id

